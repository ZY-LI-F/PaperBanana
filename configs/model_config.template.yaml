# Multi-provider model configuration for PaperBanana.
#
# A model is addressed globally as  provider_id::model_name  (see `defaults`).
# Capability:  chat | image
# Invoke type: gemini_native | openai_chat | openai_images | openai_chat_modalities | anthropic
#              - gemini_native: google-genai SDK (chat or image)
#              - openai_chat: POST /chat/completions (any OpenAI-compat endpoint)
#              - openai_images: POST /images/generations (OpenAI, DashScope wanx, ...)
#              - openai_chat_modalities: POST /chat/completions with modalities=["image","text"]
#                (OpenRouter image-gen, some VL models)
#              - anthropic: Anthropic SDK
# Invoke is inferred from (provider.type, model.capability) when omitted.

providers:
  # --- Google Gemini (native SDK) ---
  - id: gemini-official
    type: gemini
    api_key: ""                 # AIza...  (or ${GOOGLE_API_KEY})
    models:
      - {name: gemini-3.1-pro-preview,         capability: chat}
      - {name: gemini-3.1-flash-image-preview, capability: image}

  # --- 阿里 DashScope (OpenAI-compatible) ---
  # https://help.aliyun.com/zh/model-studio/developer-reference/compatibility-of-openai-with-dashscope
  - id: dashscope
    type: openai
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: ""                 # sk-...   (or ${DASHSCOPE_API_KEY})
    models:
      - {name: qwen-max,                capability: chat}
      - {name: qwen-vl-max-latest,      capability: chat}
      - {name: qwen-plus,               capability: chat}
      # 阿里万相：走 /images/generations (OpenAI images 端点)
      - {name: wanx2.1-t2i-turbo,       capability: image, invoke: openai_images}
      # 通义千问 VL 多模态图像生成：走 chat + modalities
      # - {name: qwen-image,            capability: image, invoke: openai_chat_modalities}

  # --- DeepSeek ---
  - id: deepseek
    type: openai
    base_url: https://api.deepseek.com
    api_key: ""
    models:
      - {name: deepseek-chat,  capability: chat}
      - {name: deepseek-reasoner, capability: chat}

  # --- OpenRouter (aggregator, OpenAI-compatible) ---
  - id: openrouter
    type: openai
    base_url: https://openrouter.ai/api/v1
    api_key: ""                 # sk-or-v1-...
    models:
      - {name: google/gemini-3-pro-preview,          capability: chat}
      - {name: anthropic/claude-sonnet-4.5,          capability: chat}
      # OpenRouter 的 Gemini 图像 preview 必须通过 chat-modalities 端点
      - {name: google/gemini-3-flash-image-preview,  capability: image, invoke: openai_chat_modalities}

  # --- OpenAI official ---
  - id: openai-official
    type: openai
    base_url: https://api.openai.com/v1
    api_key: ""
    models:
      - {name: gpt-4.1,       capability: chat}
      - {name: gpt-image-1,   capability: image, invoke: openai_images}

  # --- Anthropic official ---
  - id: anthropic-official
    type: anthropic
    api_key: ""
    models:
      - {name: claude-sonnet-4-5, capability: chat}

# Default selected models. Use the full provider_id::model_name form.
defaults:
  main_model:      "gemini-official::gemini-3.1-pro-preview"
  image_gen_model: "gemini-official::gemini-3.1-flash-image-preview"

# -----------------------------------------------------------------------------
# LEGACY SCHEMA (still supported for backward compat). If you prefer the old
